# =============================================================================
# Stack lokal / staging — KENAPA compose terpisah dari kode:
# - Orkestrasi Postgres + Redis + app sama seperti nanti di server
# - Satu `docker compose up` untuk onboarding tim baru
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: modular-monolith-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: internal_app
    ports:
      - "5432:5432"
    volumes:
      - pg_modular_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d internal_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: modular-monolith-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modular-monolith-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://app:app@postgres:5432/internal_app
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-min-32-characters-long!!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pg_modular_data:
